<script>
// ===== 回到顶部功能 =====
function scrollToTop() {
    window.scrollTo({
        top: 200,
        behavior: 'smooth'  // 平滑滚动
    });
}

// ===== 切换主题功能 =====
function toggleTheme() {
    // 获取当前主题
    const currentTheme = document.body.classList.contains('dark') ? 'dark' : 'light';
    // 切换到相反的主题
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    
    // 更新 body 的 class
    document.body.className = newTheme;
    
    // 保存到 localStorage
    localStorage.setItem('theme', newTheme);
    
    // 更新按钮图标
    const themeBtn = document.querySelector('.top-btn:first-child');
    if (themeBtn) {
        themeBtn.innerHTML = newTheme === 'light' ? '<img src="https://www.yanzhubg.com/setting/light.png">' 
    : '<img src="https://www.yanzhubg.com/setting/dark.png">';
    }
    
    // 同步 Artalk 主题（如果你有 artalkInstance）
    if (window.artalkInstance) {
        window.artalkInstance.setDarkMode(newTheme === 'dark');
    }
    
    console.log('主题已切换为：', newTheme);
}

// ===== 页面加载时初始化主题 =====
document.addEventListener('DOMContentLoaded', function() {
    // 读取保存的主题，默认为浅色
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.body.className = savedTheme;
    
    // 初始化按钮图标
    const themeBtn = document.querySelector('.top-btn:first-child');
    if (themeBtn) {
       themeBtn.innerHTML = newTheme === 'light' ? '<img src="https://www.yanzhubg.com/setting/light.png">' 
    : '<img src="https://www.yanzhubg.com/setting/dark.png">';
    }
});

function toggleCatalog(header) {
    const content = header.nextElementSibling;
    const icon = header.querySelector('.catalog-icon');
    
    if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.textContent = '▲';
        header.classList.add('active');
    } else {
        content.style.display = 'none';
        icon.textContent = '▼';
        header.classList.remove('active');
    }
}


</script>
